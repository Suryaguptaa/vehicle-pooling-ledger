<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairSplit | Login</title>
    <link rel="stylesheet" href="css/styles.css">
<script>if(localStorage.getItem('theme')==='dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</head>
<body class="auth-layout">
    <button onclick="toggleTheme()" class="btn-outline" style="position: absolute; top: 1rem; right: 1rem; padding: 0.5rem; border-radius: 50%; border: 1px solid var(--border); background: var(--card); color: var(--text-muted); cursor: pointer;" title="Toggle Dark/Light Mode">◑</button>

    <div class="card auth-card">
        <h2 class="brand" style="text-align: center; margin-bottom: 2rem;">FairSplit</h2>
        
        <div id="login-section">
            <h3 class="mb-3">Welcome Back</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="l-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" id="l-password" style="padding-right: 2.5rem;" required>
                        <button type="button" class="btn-icon" onclick="togglePassword('l-password', this)" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: inherit; padding: 0.2rem; cursor: pointer;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div id="l-error" class="error-msg"></div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login</button>
                <p class="text-muted" style="text-align: center; margin-top: 1.5rem;">
                    Don't have an account? <a href="#" onclick="toggleAuth(event)" style="color: var(--primary);">Sign up</a>
                </p>
            </form>
        </div>

        <div id="signup-section" style="display: none;">
            <h3 class="mb-3">Create Account</h3>
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="s-name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="s-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" id="s-password" style="padding-right: 2.5rem;" required>
                        <button type="button" class="btn-icon" onclick="togglePassword('s-password', this)" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: inherit; padding: 0.2rem; cursor: pointer;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div id="s-error" class="error-msg"></div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Sign Up</button>
                <p class="text-muted" style="text-align: center; margin-top: 1.5rem;">
                    Already have an account? <a href="#" onclick="toggleAuth(event)" style="color: var(--primary);">Login</a>
                </p>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        checkAuth(false);

        function toggleAuth(e) {
            e.preventDefault();
            const ls = document.getElementById('login-section');
            const ss = document.getElementById('signup-section');
            if (ls.style.display === 'none') {
                ls.style.display = 'block';
                ss.style.display = 'none';
            } else {
                ls.style.display = 'none';
                ss.style.display = 'block';
            }
        }

        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>';
            } else {
                input.type = 'password';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('l-error');
            const btn = e.target.querySelector('button');
            try {
                err.style.display = 'none';
                btn.textContent = 'Logging in...';
                const data = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        email: document.getElementById('l-email').value,
                        password: document.getElementById('l-password').value
                    })
                });
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({ id: data.userId, name: data.name, email: data.email }));
                navigateTo('dashboard.html');
            } catch (e) {
                err.textContent = e.message;
                err.style.display = 'block';
                btn.textContent = 'Login';
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('s-error');
            const btn = e.target.querySelector('button');
            try {
                err.style.display = 'none';
                btn.textContent = 'Signing up...';
                const data = await apiFetch('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: document.getElementById('s-name').value,
                        email: document.getElementById('s-email').value,
                        password: document.getElementById('s-password').value
                    })
                });
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({ id: data.userId, name: data.name, email: data.email }));
                navigateTo('dashboard.html');
            } catch (e) {
                err.textContent = e.message;
                err.style.display = 'block';
                btn.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
